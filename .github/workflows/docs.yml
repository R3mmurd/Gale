name: Build and deploy documentation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Gale and doc dependencies
        run: |
          pip install -e .
          pip install -r docs/sphinx/requirements.txt

      - name: Build docs
        run: make -C docs/sphinx html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/sphinx/build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
