repos:
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: env SDL_AUDIODRIVER=dummy SDL_VIDEODRIVER=dummy pytest
        language: system
        pass_filenames: false
        always_run: true
